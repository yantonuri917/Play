<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>video player</title>    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    
    <style>
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0;
            background: #000; color: white; font-family: sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
        }
        
        
        .ad-container { 
            width: 100%; text-align: center; 
            position: relative; flex-shrink: 0; background: #000;
            display: flex; justify-content: center; align-items: center;
        }
        
       
        #ad-top { height: 50px !important; min-height: 50px !important; }
        #ad-bottom { height: 60px !important; min-height: 60px !important; }
        
        .close-btn { 
            position: absolute; top: 0; right: 5px; cursor: pointer; 
            font-size: 10px; color: #fff; background: rgba(0,0,0,0.5); 
            padding: 2px 6px; z-index: 10; border-radius: 4px;
        }

        .container { 
            flex-grow: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; width: 100%;
            overflow: hidden;
        }

        #player-area { 
            position: relative; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
        }
        
        iframe, video { 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: contain;
        }

       
        video::-internal-media-controls-download-button {
            display: none !important;
        }
        video::-webkit-media-controls-enclosure {
            overflow: hidden !important;
        }
        video::-webkit-media-controls-panel {
            width: calc(100% + 30px) !important; 
        }

        
        .video-ad-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 10;
            display: none; background: rgba(0, 0, 0, 0.7);
            padding: 10px; border-radius: 8px; max-width: 90%; text-align: center;
        }

        .video-ad-overlay .close-overlay {
            position: absolute; top: -10px; right: -10px;
            background: #ff0000; color: #fff; border-radius: 50%;
            width: 20px; height: 20px; line-height: 20px;
            font-size: 12px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ad-top" class="ad-container">
        <div class="close-btn" onclick="this.parentElement.style.display='none'">× close</div>
        <script type="text/javascript">
            atOptions = { 'key' : 'baa0afb18e2e70c00e4c1406e4824e4b', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://braverybreezebinding.com/baa0afb18e2e70c00e4c1406e4824e4b/invoke.js"></script>
    </div>

    <div class="container">
        <div id="player-area"></div>
    </div>

    <div id="ad-bottom" class="ad-container"></div>

<script>
    (function() {
        // --- CONFIGURASI IKLAN POPUNDER ---
        var popunderUrl = "https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb";
        var cooldownTime = 60000; 

       
        function sanitizeInput(str) {
            if (!str) return '';
            return str.replace(/[^a-zA-Z0-9\-_]/g, '');
        }

        function isValidURL(string) {
            try { new URL(string); return true; } catch (_) { return false; }
        }

       
        function triggerPopunder(e) {
            if (e && e.type === 'contextmenu') e.preventDefault();
            if (e && e.target && (e.target.classList.contains('close-btn') || e.target.classList.contains('close-overlay'))) return;

            var currentTime = new Date().getTime();
            var lastAdTime = localStorage.getItem('lastPopunderTime');

            if (lastAdTime && (currentTime - lastAdTime < cooldownTime)) return;

            var currentUrl = window.location.href;
            var fakeLink = document.createElement('a');
            fakeLink.href = currentUrl;
            fakeLink.target = '_blank';
            fakeLink.rel = 'noopener noreferrer';
            document.body.appendChild(fakeLink);
            
            try {
                fakeLink.click();
                document.body.removeChild(fakeLink);
                localStorage.setItem('lastPopunderTime', currentTime);
                setTimeout(function() { window.location.replace(popunderUrl); }, 100);
            } catch (err) {
                window.location.href = popunderUrl;
            }
        }

        
        function injectBottomAd() {
            var bottomWrapper = document.getElementById('ad-bottom');
            if (bottomWrapper) {
                bottomWrapper.innerHTML = '<div class="close-btn" onclick="this.parentElement.style.display=\'none\'">× close</div>';
                var currentOptions = { 'key' : '64e783bd557c30cbf66293b5c5fda05f', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
                window.atOptions = currentOptions;
                
                var scrBottom = document.createElement('script');
                scrBottom.src = "https://braverybreezebinding.com/64e783bd557c30cbf66293b5c5fda05f/invoke.js";
                bottomWrapper.appendChild(scrBottom);
            }
        }

      
        document.addEventListener('DOMContentLoaded', async () => {
            setTimeout(injectBottomAd, 500);

            if (typeof CONFIG === 'undefined' || !window.supabase) return;
            
            const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
            const params = new URLSearchParams(window.location.search);
            
            let rawCode = params.get('v') || window.location.pathname.split('/').pop().replace('.mp4', '');
            let code = sanitizeInput(rawCode);

            if (!code) {
                document.getElementById('player-area').innerHTML = "<div style='color:#fff'>Kode video tidak valid.</div>";
                return;
            }

            try {
                const { data, error } = await client.from('videos_list').select('video_url').eq('access_code', code).single();
                if (error || !data || !data.video_url) throw new Error();

                const playerArea = document.getElementById('player-area');
                const url = data.video_url;

                if (!isValidURL(url) && !url.includes('blob:')) throw new Error();

                if (url.includes('.mp4') || url.includes('blob:')) {
                   
                    playerArea.innerHTML = `
                        <video id="main-video" src="${url}" controls autoplay playsinline controlsList="nodownload"></video>
                        <div id="pause-ad" class="video-ad-overlay">
                            <div class="close-overlay" onclick="document.getElementById('pause-ad').style.display='none'">×</div>
                            <div id="container-122b006ae61ef549a738f7e587027d5a"></div>
                        </div>
                    `;

                    var scrPause = document.createElement('script');
                    scrPause.async = true;
                    scrPause.setAttribute('data-cfasync', 'false');
                    scrPause.src = "https://braverybreezebinding.com/122b006ae61ef549a738f7e587027d5a/invoke.js";
                    document.body.appendChild(scrPause);

                    const videoEl = document.getElementById('main-video');
                    const pauseAdEl = document.getElementById('pause-ad');

                    videoEl.addEventListener('pause', function() { pauseAdEl.style.display = 'block'; });
                    videoEl.addEventListener('play', function() { pauseAdEl.style.display = 'none'; triggerPopunder(); });

                    videoEl.addEventListener('click', triggerPopunder);
                    videoEl.addEventListener('touchend', triggerPopunder);
                    videoEl.addEventListener('contextmenu', triggerPopunder);

                } else {
                    playerArea.innerHTML = `<iframe id="main-iframe" src="${url}" allow="autoplay; fullscreen" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-popups allow-same-origin allow-scripts"></iframe>`;
                    
                    playerArea.style.position = 'relative';
                    const overlay = document.createElement('div');
                    overlay.style = "position:absolute; top:0; left:0; width:100%; height:100%; z-index:999; cursor:pointer;";
                    playerArea.appendChild(overlay);

                    overlay.addEventListener('click', function() { triggerPopunder(); overlay.remove(); });
                    overlay.addEventListener('contextmenu', triggerPopunder);
                }
            } catch (err) {
                document.getElementById('player-area').innerHTML = "<div style='color:#fff'>Video tidak tersedia.</div>";
            }
        });

       
        document.addEventListener('click', triggerPopunder, false);
        document.addEventListener('touchend', triggerPopunder, false);
        document.addEventListener('contextmenu', triggerPopunder, false);
    })();
</script>

<script src="/tracker.js"></script>

<noscript>
    <a href="/" target="_blank"><img src="//sstatic1.histats.com/0.gif?XXXXXXXX&101" alt="page hit counter" border="0"></a>
</noscript>
    
</body>
</html>
